<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud-Store 👟</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .product-card img { max-width: 100%; border-radius: 4px; }
        button { background: #4285F4; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #3367D6; }
        #status { margin-top: 20px; font-weight: bold; color: green; }
    </style>
</head>
<body>
    <h1>☁️ Cloud-Store (Tier 1: Frontend)</h1>
    <div id="products" class="product-grid">Lade Produkte...</div>
    <div id="status"></div>

    <script>
        // API_URL Erkennung: Lokal vs. Cloud
        let API_URL = "https://cloud-store-backend-XXXXX.a.run.app"; 

        // Wenn wir lokal arbeiten (localhost oder 127.0.0.1), nutzen wir den lokalen Port
        if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
            API_URL = "http://localhost:8080";
            console.log("Lokalmodus: API_URL gesetzt auf " + API_URL);
        }

        async function fetchProducts() {

            try {
                const response = await fetch(`${API_URL}/api/products`);
                const products = await response.json();
                const container = document.getElementById('products');
                container.innerHTML = products.map(p => `
                    <div class="product-card">
                        <h3>${p.name}</h3>
                        <p>${p.price.toFixed(2)} €</p>
                        <button onclick="order(${p.id})">Kaufen</button>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('products').innerText = "Fehler beim Laden der Produkte. Backend erreichbar?";
            }
        }

        async function order(id) {
            const status = document.getElementById('status');
            status.innerText = "Bestellung wird gesendet...";
            try {
                const response = await fetch(`${API_URL}/api/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId: id, timestamp: new Date() })
                });
                const result = await response.json();
                status.innerText = `✅ ${result.message} (ID: ${result.orderId})`;
            } catch (err) {
                status.innerText = "❌ Fehler bei der Bestellung.";
            }
        }

        fetchProducts();
    </script>
</body>
</html>
