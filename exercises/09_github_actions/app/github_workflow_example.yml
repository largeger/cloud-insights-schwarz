name: Cloud Basics Multistage CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: 🏗️ Build & 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: exercises/09_github_actions/app/package.json

      - name: Install dependencies
        run: npm install
        working-directory: exercises/09_github_actions/app

      - name: Run Tests
        run: npm test
        working-directory: exercises/09_github_actions/app

  security-check:
    name: 🛡️ Security Audit
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run NPM Audit
        run: npm audit --audit-level=high
        working-directory: exercises/09_github_actions/app

  # Dieser Job ist vorbereitet, erfordert aber GCP Credentials als Secrets
  deploy:
    name: 🚀 Deploy to Cloud Run
    needs: security-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Platzhalter für Auth & Deploy (Beispielhaft)
      - name: echo Deploy Info
        run: echo "Hier würde gcloud run deploy --source . stehen"
